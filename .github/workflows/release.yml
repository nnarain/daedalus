name: "KiCAD CI/CD for Daedalus"

on:
  push:
    tags:
      - "*"
  workflow_dispatch:

jobs:
  generate-outputs:
    name: "KiCAD Outputs"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: INTI-CMNB/KiBot@v2_k9
        with:
          config: daedalus.kibot.yaml
          dir: output
          schema: 'daedalus.kicad_sch'
          board: 'daedalus.kicad_pcb'
          verbose: 1
      - uses: actions/upload-artifact@v4
        with:
          name: output
          path: output

