# Enhanced Kibot Configuration with Automatic Revision Updates
# This file demonstrates how to automate revision text updates

kibot:
  version: 1

# Global variables - can be overridden by environment or scripts
global:
  # Default revision - will be updated by script
  revision: 'A'
  # Project info
  project: 'daedalus'

preflight:
  run_erc: false
  run_drc: false
  
  # Update PCB revision from git tags before processing
  run_script:
    - 'python3'
    - 'scripts/update_revision.py'
    - 'daedalus.kicad_pcb'

outputs:

  # Design Docs (existing outputs with automatic revision)

  - name: 'print_sch'
    comment: 'Print schematic (PDF) with updated revision'
    type: pdf_sch_print
    dir: design

  - name: 'print_sch_svg'
    comment: "Print schematic (SVG) with updated revision"
    type: svg_sch_print
    dir: renders

  - name: "download_ds"
    comment: "Download Datasheets"
    type: download_datasheets
    dir: design/datasheets

  - name: 'design_docs'
    comment: "Design Documentation with updated revision"
    type: compress
    dir: .
    options:
      files:
        - {from_output: print_sch, dest: /}
        - {from_output: download_ds, dest: /datasheets}

  # Fabrication outputs (existing outputs - now with automatic revision)

  - name: gerbers
    comment: Gerbers files with updated revision
    type: gerber
    dir: fab/gerbers
    layers:
      - F.Cu
      - B.Cu
      - PWR
      - GND
      - F.SilkS  # This layer contains the revision text
      - B.SilkS
      - F.Mask
      - B.Mask
      - Edge.Cuts

  - name: drill
    comment: Drill files
    type: excellon
    dir: fab/drill
    options:
      pth_and_npth_single_file: false
      pth_id: '-PTH'
      npth_id: '-NPTH'
      metric_units: false
      output: "%f%i.%x"

  - name: 'bom'
    comment: "Bill of Materials in CSV format"
    type: bom
    dir: fab
    options:
      format: CSV
      csv:
        hide_pcb_info: true
        hide_stats_info: true
      columns:
        - field: Value
          name: Comment
        - field: References
          name: Designator
        - field: Footprint
        - field: LCSC

  - name: 'position'
    comment: "Pick and place file for JLCPCB"
    type: position
    dir: fab/position
    options:
      format: CSV
      only_smd: true
      units: millimeters
      separate_files_for_front_and_back: true
      columns:
        - {id: Ref, name: Designator}
        - Val
        - Package
        - {id: PosX, name: 'Mid X'}
        - {id: PosY, name: 'Mid Y'}
        - {id: Rot, name: Rotation}
        - {id: Side, name: Layer}

  - name: 'jlcpcb_fab'
    comment: "All build files for JLCPCB with updated revision"
    type: compress
    dir: .
    options:
      files:
        - {from_output: gerbers, dest: /}
        - {from_output: drill, dest: /}
        - {from_output: bom, dest: /}
        - {from_output: position, dest: /}

  # Misc outputs (existing outputs)

  - name: 'ibom'
    comment: 'Interactive BOM'
    type: ibom
    dir: html
    options:
      dark_mode: false

  - name: pcbdraw_top
    comment: "PcbDraw top with updated revision"
    type: pcbdraw
    dir: renders
    options: &pcb_draw_ops
      format: png
      no_drillholes: False
      placeholder: True
      mirror: False
      vcuts: True
      warnings: all
      show_components: all

  - name: pcbdraw_bottom
    comment: "PcbDraw bottom"
    type: pcbdraw
    dir: renders
    options:
      <<: *pcb_draw_ops
      bottom: True

  - name: "render3d"
    type: render_3d
    dir: renders
    options:
      rotate_x: 3
      rotate_z: -2