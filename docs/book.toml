[book]
authors = ["Natesh Narain"]
language = "en"
multilingual = false
src = "src"
title = "Daedalus Raspberry Pi Add-on"

[output.html]
default-theme = "light"

[preprocessor.file-search]
files = [
    {alias = "schematic",     path = "../output/design/daedalus-schematic.pdf",   type = "link"},
    {alias = "schematic-svg", path = "../output/renders/daedalus-schematic.svg",   type = "image"},
    {alias = "render-top",    path = "../output/renders/daedalus-top.png",         type = "image"},
    {alias = "render-bottom", path = "../output/renders/daedalus-bottom.png",      type = "image"},
    {alias = "ibom",          path = "../output/html/daedalus-ibom.html",       type = "link"},
    {alias = "render-3d",     path = "../output/renders/daedalus-3D_top.png",      type = "image"},
    {alias = "jlcpcb-files",  path = "../output/daedalus-jlcpcb_fab.zip",  type = "link"},
]

[preprocessor.d2]
path = "d2"
layout = "elk"
inline = true
output-dir = "d2"